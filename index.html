<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileDownload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            transition: all 0.2s;
        }
        body {
            background-color: antiquewhite;
        }
        .card {
            background-color: bisque;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            gap: 10px;
            padding: 20px;
            width: 20rem;
            height: 20rem;
            border-radius: 10px;
        }
        h1 {
            font-size: 50px;
            color: rgb(58, 57, 57);
        }
        .dow {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
        }
        button {
            font-size: 40px;
            padding: 10px;
            background-color: coral;
            border: 2px salmon solid;
            border-radius: 8px;
            color: aliceblue;
            transition: all 0.2s;
        }
        button:active {
            border: 2px saddlebrown solid;
            transform: scale(0.95);
        }
        .help {
            font-weight: 600;
            font-size: 18px;
            position: absolute;
            bottom: 0%;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <script>
        function jump_view(url) {
            window.location.assign(url)
        }
        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
    <div class="card">
        <h1>文件下载</h1>
        <div class="dow">
            <button class="btn"
            onclick="downloadFile('./P1.png', './P1.png')">文件一</button>
            <button class="btn"
            onclick="downloadFile('./P2.png', './P2.png')">文件二</button>
        </div>
    </div>
    <p class="help">Power by 氢気氚</p>
</body>
</html>
